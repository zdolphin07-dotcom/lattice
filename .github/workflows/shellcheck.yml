name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check (bash -n)
        run: bash -n init.sh install.sh tests/smoke-test.sh $(find harness-template prismspec/bin -name '*.sh')

      - name: Validate PrismSpec skill frontmatter
        run: |
          for file in prismspec/skills/*/SKILL.md; do
            grep -q '^---$' "$file"
            grep -q '^name: ' "$file"
            grep -q '^description: ' "$file"
          done

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: ShellCheck
        run: shellcheck --severity=warning init.sh install.sh tests/smoke-test.sh $(find harness-template prismspec/bin -name '*.sh')

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Validate packaged YAML contracts
        run: |
          yq eval '.' prismspec/skillpack.yaml >/dev/null
          yq eval '.' harness-template/.github/workflows/lattice-eval.yml >/dev/null

      - name: Run smoke test
        run: bash tests/smoke-test.sh
