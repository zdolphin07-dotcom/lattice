# ┌──────────────────────────────────────────────────────┐
# │  manifest.yaml — Lattice project declaration     │
# │  All harness scripts read this file to adapt to      │
# │  different projects. Change projects by editing this  │
# │  file only — scripts need zero modification.          │
# └──────────────────────────────────────────────────────┘
# Auto-generated by lattice init; replace {placeholder} values

project:
  name: {PROJECT_NAME}
  language: {LANGUAGE}
  version_constraint: "{VERSION}"

# ── Layer control (pluggable) ──
kernel:
  layers:
    orchestrator: true     # L1: Workflow orchestration (always enabled)
    knowledge: true        # L2: Knowledge base engine (can be disabled)
    delivery: true         # L3: Verification & delivery (can be disabled)

tools:
  required:
{TOOLS_REQUIRED}
  optional:
    - { name: kubectl,   check: "kubectl version --client 2>/dev/null" }

services:
{SERVICES}

commands:
  build:            "{CMD_BUILD}"
  lint:             "{CMD_LINT}"
  test:             "{CMD_TEST}"
  integration_test: "{CMD_INTEGRATION_TEST}"
  smoke_test:       "{CMD_SMOKE_TEST}"

specs:
  dir: "lattice/specs"
  # Optional active spec selector. Accepts either a spec id under specs.dir or a path.
  active: ""
  # Override this path to use a project/team-specific spec template.
  # PrismSpec also provides scenario templates under prismspec/templates/.
  template: "lattice/kernel/orchestrator/templates/spec-template.md"
  # auto = model selects plan or tdd by risk; plan/tdd force a project default.
  # A user may still override the mode for a single spec in /sdd or /brainstorm.
  default_execution_mode: "auto"
  allow_execution_mode_override: true
  required_sections:
    - "Intent"
    - "Scope"
    - "Context"
    - "Acceptance Criteria"
    - "Design Decisions"
    - "Execution Policy"
    - "Verification Plan"

testing:
  strategies:
    go:
      file_pattern: "*_test.go"
      func_regex: 'func Test(AC|_AC)([0-9]+)'
      ac_group: 2
    node:
      file_pattern: "*.test.{ts,js}"
      func_regex: '(describe|it|test).*AC[_-]?([0-9]+)'
      ac_group: 2
    python:
      file_pattern: "test_*.py"
      func_regex: 'def test_ac([0-9]+)'
      ac_group: 1

  coverage_thresholds:
    - { path: "{SERVICE_DIR}", min: 80 }
    - { path: "{HANDLER_DIR}", min: 60 }

drift:
  ddl:
    orm: {ORM}
    model_tag: '{MODEL_TAG}'
    model_dirs: {MODEL_DIRS}
  routes:
    framework: {FRAMEWORK}
    router_pattern: '{ROUTER_PATTERN}'
  error_codes:
    const_pattern: '{ERROR_CONST_PATTERN}'

pipeline:
  steps:
    - { name: bootstrap,        run: "lattice/kernel/delivery/bootstrap.sh check",                   skip_when: never }
    - { name: spec-lint,        run: "lattice/kernel/delivery/gates/spec-lint.sh ${SPEC_FILE}",     skip_when: no_spec }
    - { name: build,            run: "${commands.build}",                                         skip_when: no_code }
    - { name: lint,             run: "${commands.lint}",                                          skip_when: no_code }
    - { name: unit-test,        run: "${commands.test}",                                          skip_when: no_code }
    - { name: ac-coverage,      run: "lattice/kernel/delivery/gates/ac-coverage.sh ${SPEC_FILE} .", skip_when: no_spec }
    - { name: integration-test, run: "${commands.integration_test}",                              skip_when: no_integration }
    - { name: drift-check,      run: "lattice/kernel/delivery/gates/drift-check.sh ${SPEC_FILE} .", skip_when: no_spec }
    - { name: compliance,       run: "lattice/kernel/delivery/gates/compliance.sh ${SPEC_FILE}",    skip_when: no_spec }

deploy:
  docker:
    builder_image: "{BUILDER_IMAGE}"
    runner_image:  "{RUNNER_IMAGE}"
    dockerfile:    "deploy/Dockerfile"
  registry: "${DOCKER_REGISTRY}"
  environments:
    test:
      namespace: "${K8S_NAMESPACE:-{PROJECT_NAME}-test}"
      manifests: "deploy/k8s/"
      rollback: auto
      smoke_after_deploy: true
    staging:
      rollback: manual
      smoke_after_deploy: true
  ci:
    platform: {CI_PLATFORM}
    integration_timeout: "10m"

knowledge:
  local_dir: "lattice/knowledge"
  central:
    repo: ""                   # Central knowledge repo URL (e.g. https://github.com/your-org/knowledge.git)
    mode: read-only            # read-only | read-write
    conflict: prefer-local     # prefer-local | prefer-remote | fail
