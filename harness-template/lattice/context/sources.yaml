# sources.yaml — optional machine-readable context source policy
#
# Agents should read README.md first. This file is for scripts, CI, and future
# automation that need structured include/exclude and precedence rules.

sources:
  map: "lattice/context/README.md"
  external: "lattice/context/external.md"
  knowledge_dir: "lattice/context/knowledge"
  drafts_dir: "lattice/context/drafts"
  specs_dir: "lattice/specs"
  code:
    include:
      - "README.md"
      - "docs/**"
      - "src/**"
      - "app/**"
      - "internal/**"
      - "packages/**"
      - "tests/**"
      - "prisma/**"
      - "migrations/**"
    exclude:
      - "**/node_modules/**"
      - "**/.git/**"
      - "**/dist/**"
      - "**/build/**"
      - "**/.env*"

policy:
  precedence:
    - user_instruction
    - current_code
    - tests
    - schema
    - project_knowledge
    - historical_specs
    - external_knowledge
    - model_prior
  conflict: record_in_context
  sensitivity:
    never_copy:
      - secrets
      - tokens
      - private_user_data
      - production_raw_data
