# flow.yaml — Lattice phase behavior guide (not a runtime config)
# Engine-agnostic phase definitions. For engine-specific mappings, see docs/adapters/

controller:
  command: "/prismspec"
  skill: "prismspec/skills/workflow/SKILL.md"
  description: "Resolve spec, mode, and next stage; delegate to stage skills"

stages:
  - name: specification
    output: ["lattice/specs/{spec-id}/spec.md", "lattice/specs/{spec-id}/context.md"]
    template: "lattice/kernel/orchestrator/templates/spec-template.md"
    gate: spec-lint
    layers: [orchestrator, context]
    description: "Explore code and context knowledge, clarify intent, author persistent spec"

  - name: planning
    output: "lattice/specs/{spec-id}/plan.md"
    layers: [orchestrator]
    description: "Decompose spec into AC-traced tasks with global constraints and interfaces"

  - name: implementation
    output: ".lattice/sdd/{spec-id}/{task-id}/{brief.md,review-package.md}"
    gate: [build, lint, test]
    layers: [orchestrator, delivery]
    policy: [plan, tdd]
    description: "Execute plan or red-test-first TDD policy and produce task evidence"

  - name: review
    output: ".lattice/sdd/{spec-id}/branch/review-summary.json"
    gate: [evidence]
    layers: [orchestrator]
    description: "Review implementation evidence with pass/fail/cannot_verify verdicts"

  - name: verification
    command: "lattice/kernel/delivery/pipeline.sh"
    gate: [bootstrap, spec-lint, build, lint, unit-test, ac-coverage, integration-test, drift-check, compliance]
    on_fail: fix
    max_retries: 3
    layers: [delivery]
    description: "Run independent verification gates; fix and re-run on failure"

  - name: legacy-finishing
    output: "lattice/specs/{spec-id}/summary.md"
    gate: [evidence]
    layers: [orchestrator, delivery]
    optional: true
    description: "Optional branch/worktree closeout for teams that still require summary.md"

  - name: deploy
    command: "lattice/kernel/delivery/deploy.sh"
    gate: smoke
    layers: [delivery]
    description: "Deploy per manifest config and run smoke tests"

transitions:
  specification -> planning: "spec is reviewable and execution policy selected"
  planning -> implementation: "plan complete"
  implementation -> review: "task evidence exists"
  review -> verification: "review passes or risk is explicitly accepted"
  verification -> implementation: "pipeline fails, fix and retry"
  verification -> deploy: "pipeline passes and deployment requested"

behavioral_rules:
  workflow: "PrismSpec"
  hard_gate: specification
  retry_budget: 3
  default_execution_mode: "manifest:specs.default_execution_mode"
  allow_execution_mode_override: "manifest:specs.allow_execution_mode_override"
  scratch_dir: ".lattice/sdd"
  spec_lock: "bash lattice/kernel/delivery/gates/spec-lock.sh acquire <spec-file>"
