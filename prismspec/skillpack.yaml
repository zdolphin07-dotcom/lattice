api_version: prismspec.lattice.dev/v1
kind: SkillPack
metadata:
  name: prismspec
  version: 0.1.0
  description: Progressive Spec-Driven Development skill pack for AI coding agents.
  language: zh-CN
  license: MIT
compatibility:
  agents:
    - claude-code
    - codex
    - cursor
    - aider
    - superpowers
  standards:
    - agent-skills-packaging
    - superpowers-workflow-discipline
  host_modes:
    - standalone
    - lattice-hosted
product_blocks:
  - id: clarify
    display_name: Clarify
    purpose: Resolve intent, context, assumptions, conflicts, and blocking questions before writing the spec.
    skills:
      - prismspec/skills/prismspec-specification/SKILL.md
    artifacts:
      - spec.md#context-basis
    gates:
      - prismspec/bin/lint.sh <spec-dir> spec
  - id: spec
    display_name: Spec
    purpose: Turn clarified intent into scoped, approved, AC-traced, risk-aware specification.
    skills:
      - prismspec/skills/prismspec-specification/SKILL.md
    artifacts:
      - spec.md
    gates:
      - prismspec/bin/lint.sh <spec-dir> spec
      - lattice/kernel/orchestrator/sdd/spec-state-lint.sh
  - id: build
    display_name: Build
    purpose: Plan and implement one AC-traced slice at a time with task evidence, TDD evidence, and debugging discipline.
    skills:
      - prismspec/skills/prismspec-planning/SKILL.md
      - prismspec/skills/prismspec-implementation/SKILL.md
      - prismspec/skills/prismspec-debugging/SKILL.md
    artifacts:
      - plan.md
      - task evidence
      - tdd-evidence.json
    gates:
      - lattice/kernel/orchestrator/sdd/plan-lint.sh
      - lattice/kernel/orchestrator/sdd/task-evidence-lint.sh
  - id: review
    display_name: Review
    purpose: Independently inspect implementation evidence and diff before verification.
    skills:
      - prismspec/skills/prismspec-review/SKILL.md
    artifacts:
      - review.md
    evidence_sidecars:
      - review-summary.json
      - review-package.md
    gates:
      - lattice/kernel/orchestrator/sdd/review-summary.sh
  - id: verify
    display_name: Verify
    purpose: Prove completion with fresh command output, pipeline gates, eval evidence, and residual-risk recording.
    skills:
      - prismspec/skills/prismspec-verification/SKILL.md
    artifacts:
      - verify.md
      - eval run JSON
    gates:
      - lattice/kernel/delivery/pipeline.sh
entrypoints:
  command: prismspec/commands/prismspec.md
  new: prismspec/bin/new.sh
  router: prismspec/bin/guide.sh
  lint: prismspec/bin/lint.sh
  doctor: prismspec/bin/doctor.sh
commands:
  canonical:
    - id: prismspec
      path: prismspec/commands/prismspec.md
    - id: spec
      path: prismspec/commands/spec.md
    - id: plan
      path: prismspec/commands/plan.md
    - id: implement
      path: prismspec/commands/implement.md
    - id: review
      path: prismspec/commands/review.md
    - id: verify
      path: prismspec/commands/verify.md
    - id: capture
      path: prismspec/commands/capture.md
skills:
  canonical:
    - id: workflow
      type: controller
      path: prismspec/skills/prismspec-workflow/SKILL.md
      interface: prismspec/skills/prismspec-workflow/agents/openai.yaml
    - id: specification
      type: stage
      path: prismspec/skills/prismspec-specification/SKILL.md
      interface: prismspec/skills/prismspec-specification/agents/openai.yaml
    - id: planning
      type: stage
      path: prismspec/skills/prismspec-planning/SKILL.md
      interface: prismspec/skills/prismspec-planning/agents/openai.yaml
    - id: implementation
      type: stage
      path: prismspec/skills/prismspec-implementation/SKILL.md
      interface: prismspec/skills/prismspec-implementation/agents/openai.yaml
    - id: review
      type: stage
      path: prismspec/skills/prismspec-review/SKILL.md
      interface: prismspec/skills/prismspec-review/agents/openai.yaml
    - id: verification
      type: stage
      path: prismspec/skills/prismspec-verification/SKILL.md
      interface: prismspec/skills/prismspec-verification/agents/openai.yaml
    - id: knowledge-capture
      type: support
      path: prismspec/skills/prismspec-knowledge-capture/SKILL.md
      interface: prismspec/skills/prismspec-knowledge-capture/agents/openai.yaml
    - id: debugging
      type: support
      path: prismspec/skills/prismspec-debugging/SKILL.md
      interface: prismspec/skills/prismspec-debugging/agents/openai.yaml
workflow:
  stages:
    - id: specification
      skill: prismspec/skills/prismspec-specification/SKILL.md
      outputs:
        - spec.md
    - id: planning
      skill: prismspec/skills/prismspec-planning/SKILL.md
      inputs:
        - spec.md
      outputs:
        - plan.md
    - id: implementation
      skill: prismspec/skills/prismspec-implementation/SKILL.md
      inputs:
        - spec.md
        - plan.md
      outputs:
        - code
        - tests
        - task evidence
    - id: review
      skill: prismspec/skills/prismspec-review/SKILL.md
      inputs:
        - spec.md
        - plan.md
        - task evidence
      outputs:
        - review.md
      evidence_sidecars:
        - review-summary.json
    - id: verification
      skill: prismspec/skills/prismspec-verification/SKILL.md
      inputs:
        - spec.md
        - plan.md
        - code
        - tests
        - review.md
        - review-summary.json
      outputs:
        - verify.md
templates:
  default: prismspec/templates/spec-template.md
  lite: prismspec/templates/spec-template-lite.md
  service: prismspec/templates/spec-template-service.md
  frontend: prismspec/templates/spec-template-frontend.md
  tdd: prismspec/templates/spec-template-tdd.md
references:
  mode_selection: prismspec/references/mode-selection.md
  risk_routing_card: prismspec/references/risk-routing-card.md
  definition_of_done: prismspec/references/definition-of-done.md
  spec_quality: prismspec/references/spec-quality-checklist.md
  tdd_evidence: prismspec/references/tdd-evidence-checklist.md
  review_evidence: prismspec/references/review-evidence-checklist.md
  superpowers_alignment: prismspec/references/superpowers-alignment.md
  agent_skills_alignment: prismspec/references/agent-skills-alignment.md
reviewers:
  task: prismspec/agents/task-reviewer.md
contracts:
  standalone_spec_root: prismspec/specs
  lattice_spec_root: lattice/specs
  required_artifacts:
    - spec.md
    - plan.md
    - review.md
    - verify.md
  execution_modes:
    - auto
    - plan
    - tdd
quality_gates:
  - bash prismspec/bin/doctor.sh
  - bash prismspec/bin/new.sh --help
  - bash prismspec/bin/guide.sh --json
  - bash prismspec/bin/lint.sh prismspec skillpack
  - bash prismspec/bin/lint.sh <spec-dir>
